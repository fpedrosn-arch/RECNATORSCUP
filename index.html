<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RECNATORS CUP — Grupos (MD3)</title>

  <!-- PWA -->
  <link rel="manifest" href="/RECNATORSCUP/Manifest.webmanifest">
  <meta name="theme-color" content="#0b1020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root{
      --bg:#0b1020;
      --bg2:#070a12;
      --panel:rgba(255,255,255,.08);
      --panel2:rgba(0,0,0,.35);
      --line:rgba(255,255,255,.12);
      --txt:#e8eefc;
      --muted:#a9b4d0;
      --good:#22c55e;
      --bad:#ef4444;
      --accent:#60a5fa;
      --radius:18px;
      --shadow: 0 18px 55px rgba(0,0,0,.55);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--txt);
      background:
        radial-gradient(1200px 700px at 50% 30%, #121a33 0%, var(--bg2) 55%, #05070e 100%);
    }

    .wrap{ max-width:1150px; margin:0 auto; padding:14px; }

    header{
      display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between;
      padding:14px 14px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.25));
      border-radius:22px;
      box-shadow:var(--shadow);
      position:sticky; top:10px; z-index:20;
      backdrop-filter: blur(10px);
    }

    .brand{ display:flex; gap:12px; align-items:center; min-width: 270px; }
    .logoCup{
      width:46px; height:46px; border-radius:16px;
      background: rgba(255,255,255,.08);
      border:1px solid var(--line);
      display:grid; place-items:center;
      flex:0 0 auto;
    }
    .brand h1{ font-size:16px; margin:0; letter-spacing:.4px; font-weight:950; }
    .brand p{ margin:0; color:var(--muted); font-size:12px; line-height:1.35; font-weight:750; }

    .tabs{
      display:flex; gap:8px; flex-wrap:wrap;
      justify-content:flex-end;
    }
    .tab{
      appearance:none; border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color:var(--txt);
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
      transition: transform .08s ease, background .2s ease, border-color .2s ease;
    }
    .tab:active{ transform: scale(.98); }
    .tab[aria-selected="true"]{
      background: rgba(96,165,250,.18);
      border-color: rgba(96,165,250,.35);
    }

    .actions{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .btn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color:var(--txt);
      padding:10px 12px;
      border-radius:999px;
      font-weight:950;
      cursor:pointer;
      transition: transform .08s ease;
    }
    .btn:active{ transform: scale(.98); }
    .btn.danger{
      border-color: rgba(239,68,68,.35);
      background: rgba(239,68,68,.10);
    }

    .grid{ display:grid; grid-template-columns: 1fr; gap:14px; margin-top:14px; }

    .card{
      border:1px solid var(--line);
      border-radius:22px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.35));
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .cardHead{
      display:flex; flex-wrap:wrap; gap:10px;
      align-items:center; justify-content:space-between;
      padding:14px 14px;
      border-bottom:1px solid var(--line);
      background: rgba(0,0,0,.20);
    }
    .cardHead h2{ margin:0; font-size:14px; letter-spacing:.4px; font-weight:950; }
    .hint{ color:var(--muted); font-size:12px; font-weight:800; }

    .section{ padding:14px; }

    .kpis{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:10px;
    }
    .kpi{
      background: rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:12px;
    }
    .kpi .n{ font-size:22px; font-weight:1000; }
    .kpi .l{ font-size:12px; font-weight:900; color:var(--muted); }

    .groupBlock{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.20);
      border-radius:22px;
      overflow:hidden;
      margin:12px 0;
    }
    .groupHead{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
    }
    .groupTitle{ font-weight:1000; letter-spacing:.6px; }
    .groupMeta{ color:var(--muted); font-size:12px; font-weight:900; }

    .matches{ padding:12px; display:grid; gap:10px; }

    .match{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      border-radius:18px;
      padding:12px;
      display:grid;
      gap:10px;
    }
    .matchTop{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }
    .seriesPill{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      font-weight:1000;
      color:var(--txt);
      white-space:nowrap;
    }

    .rowTeams{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      gap:10px;
      align-items:center;
    }
    .side{
      display:flex; align-items:center; gap:10px;
      min-width: 0;
    }
    .side.right{ justify-content:flex-end; }

    /* sem imagens por enquanto: “placa” bonita */
    .teamBadge{
      width:58px;
      height:58px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-weight:1000;
      letter-spacing:.5px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
    }

    .name{
      font-weight:1000;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .vs{ font-weight:1000; opacity:.85; padding:6px 10px; }

    .games{
      display:grid;
      gap:8px;
    }
    .gameRow{
      display:grid;
      grid-template-columns: 56px 1fr 22px 1fr;
      gap:10px;
      align-items:center;
    }
    .glabel{ color:var(--muted); font-size:12px; font-weight:950; }

    .scoreInput{
      width:100%;
      padding:10px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color:var(--txt);
      font-weight:1000;
      font-size:16px;
      text-align:center;
      outline:none;
    }
    .scoreInput:focus{
      border-color: rgba(96,165,250,.55);
      box-shadow: 0 0 0 3px rgba(96,165,250,.20);
    }
    .scoreInput:disabled{
      opacity:.45;
      cursor:not-allowed;
      filter:saturate(.7);
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{ -webkit-appearance: none; margin: 0; }
    input[type=number]{ -moz-appearance: textfield; }

    .note{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      font-weight:800;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border-radius:16px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.22);
      table-layout:fixed;
      min-width: 760px;
    }
    thead th{
      background: rgba(0,0,0,.35);
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      font-size:12px;
      text-align:center;
      color:var(--muted);
      white-space:nowrap;
      font-weight:950;
    }
    tbody td{
      padding:10px 8px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:13px;
      text-align:center;
      vertical-align:middle;
      font-weight:950;
    }
    tbody tr:last-child td{ border-bottom:none; }

    .tdTeam{
      text-align:left;
      display:flex; align-items:center; gap:10px;
      min-width: 240px;
    }

    .miniBadge{
      width:36px; height:36px;
      border-radius:12px;
      display:grid; place-items:center;
      font-weight:1000;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
    }

    .rankBar{
      width:10px; border-radius:999px;
      background: rgba(255,255,255,.10);
      height: 22px;
      flex:0 0 auto;
    }
    .rowGood .rankBar{ background: rgba(34,197,94,.55); }
    .rowBad  .rankBar{ background: rgba(239,68,68,.55); }
    .rowGood{ background: rgba(34,197,94,.06); }
    .rowBad{ background: rgba(239,68,68,.06); }

    @media (max-width: 900px){
      .kpis{ grid-template-columns: 1fr; }
    }
    @media (max-width: 720px){
      .wrap{ padding:12px; }
      .rowTeams{ grid-template-columns: 1fr; }
      .side, .side.right{ justify-content:center; }
      .vs{ text-align:center; }
      .gameRow{ grid-template-columns: 54px 1fr 18px 1fr; }
      table{ min-width: 720px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logoCup">🏆</div>
        <div>
          <h1>RECNATORS CUP — Fase de Grupos (MD3)</h1>
          <p>
            ✅ Todos os jogos da fase de grupos são <b>MD3</b> (gols por jogo).<br>
            Se fechar <b>2–0</b> nos 2 primeiros jogos, o <b>J3 bloqueia</b>.
          </p>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="btnCopyView">Copiar (aba atual)</button>
        <button class="btn danger" id="btnResetAll">Resetar tudo</button>
      </div>

      <div class="tabs" role="tablist" aria-label="Abas">
        <button class="tab" role="tab" data-view="r1_27" aria-selected="true">27/02</button>
        <button class="tab" role="tab" data-view="r1_28" aria-selected="false">28/02</button>
        <button class="tab" role="tab" data-view="r1_01" aria-selected="false">01/03</button>
        <button class="tab" role="tab" data-view="r1_02" aria-selected="false">02/03</button>

        <button class="tab" role="tab" data-view="r2_03" aria-selected="false">03/03</button>
        <button class="tab" role="tab" data-view="r2_04" aria-selected="false">04/03</button>
        <button class="tab" role="tab" data-view="r2_05" aria-selected="false">05/03</button>
        <button class="tab" role="tab" data-view="r2_06" aria-selected="false">06/03</button>

        <button class="tab" role="tab" data-view="r3_07" aria-selected="false">07/03</button>
        <button class="tab" role="tab" data-view="r3_08" aria-selected="false">08/03</button>
        <button class="tab" role="tab" data-view="r3_09" aria-selected="false">09/03</button>
        <button class="tab" role="tab" data-view="r3_10" aria-selected="false">10/03</button>

        <button class="tab" role="tab" data-view="table" aria-selected="false">Tabela</button>
        <button class="tab" role="tab" data-view="playoffs" aria-selected="false">Playoffs</button>
      </div>
    </header>

    <main class="grid" id="content"></main>
  </div>

  <script>
    /* ===============================
      CONFIG — TIMES / GRUPOS
    =============================== */
    const TEAMS = {
      // Grupo A
      tog: { name:"TOG" },
      skyelite: { name:"Sky Elite" },
      parkclub: { name:"park club" },
      hawks: { name:"Hawks" },

      // Grupo B
      fury: { name:"The Fury Foxes" },
      tropopcorn: { name:"Tropopcorn" },
      imperial: { name:"Imperial Strikers" },
      darkskull: { name:"Dark Skull" },

      // Grupo C
      angels: { name:"angels rl" },
      vst: { name:"Vst" },
      trapaceiros: { name:"Trapaceiros FC" },
      stage7: { name:"Stage7" },

      // Grupo D
      elementais: { name:"Elementais" },
      deportivo: { name:"Deportivo WW" },
      lemon: { name:"Lemon - e sports" },
      logsevenb: { name:"Logseven B" },

      // Grupo E
      sapos: { name:"saposGamers" },
      legends: { name:"The Legends" },
      alvinegros: { name:"Alvinegros RL" },
      gladiators: { name:"Gladiators rl" },

      // Grupo F
      supernova: { name:"SuperNovaRl" },
      dragon: { name:"Dragon" },
      nightfall: { name:"Nightfall esports" },
      nytrix: { name:"Nytrix" },

      // Grupo G
      forestcrows: { name:"Forest Crows" },
      prodigio: { name:"Prodígio" },
      grandseven: { name:"grand seven7" },
      attacs: { name:"Attacs" },

      // Grupo H
      sekikana: { name:"Se kikana" },
      logseven: { name:"logseven" },
      cyclone: { name:"Cyclone" },
      hush: { name:"Hush B/Cyclone" },
    };

    const GROUPS = {
      A: ["tog","skyelite","parkclub","hawks"],
      B: ["fury","tropopcorn","imperial","darkskull"],
      C: ["angels","vst","trapaceiros","stage7"],
      D: ["elementais","deportivo","lemon","logsevenb"],
      E: ["sapos","legends","alvinegros","gladiators"],
      F: ["supernova","dragon","nightfall","nytrix"],
      G: ["forestcrows","prodigio","grandseven","attacs"],
      H: ["sekikana","logseven","cyclone","hush"],
    };

    /* ===============================
      CALENDÁRIO — RODADAS
      (iguais ao seu texto)
    =============================== */
    const SCHEDULE = {
      // RODADA 1
      r1_27: { label:"🔥 Rodada 1 — 27 de Fevereiro (Grupos A e B)", groups:{
        A: [["parkclub","hawks"], ["tog","skyelite"]],
        B: [["tropopcorn","imperial"], ["darkskull","fury"]],
      }},
      r1_28: { label:"🔥 Rodada 1 — 28 de Fevereiro (Grupos C e D)", groups:{
        C: [["angels","trapaceiros"], ["stage7","vst"]],
        D: [["elementais","lemon"], ["deportivo","logsevenb"]],
      }},
      r1_01: { label:"🔥 Rodada 1 — 1 de Março (Grupos E e F)", groups:{
        E: [["sapos","alvinegros"], ["gladiators","legends"]],
        F: [["dragon","nightfall"], ["nytrix","supernova"]],
      }},
      r1_02: { label:"🔥 Rodada 1 — 2 de Março (Grupos G e H)", groups:{
        G: [["attacs","grandseven"], ["forestcrows","prodigio"]],
        H: [["hush","cyclone"], ["logseven","sekikana"]],
      }},

      // RODADA 2
      r2_03: { label:"🔥 Rodada 2 — 3 de Março (Grupos A e B)", groups:{
        A: [["hawks","skyelite"], ["parkclub","tog"]],
        B: [["imperial","fury"], ["tropopcorn","darkskull"]],
      }},
      r2_04: { label:"🔥 Rodada 2 — 4 de Março (Grupos C e D)", groups:{
        C: [["trapaceiros","vst"], ["angels","stage7"]],
        D: [["lemon","logsevenb"], ["elementais","deportivo"]],
      }},
      r2_05: { label:"🔥 Rodada 2 — 5 de Março (Grupos E e F)", groups:{
        E: [["alvinegros","legends"], ["sapos","gladiators"]],
        F: [["nightfall","supernova"], ["dragon","nytrix"]],
      }},
      r2_06: { label:"🔥 Rodada 2 — 6 de Março (Grupos G e H)", groups:{
        G: [["grandseven","prodigio"], ["attacs","forestcrows"]],
        H: [["cyclone","sekikana"], ["hush","logseven"]],
      }},

      // RODADA 3
      r3_07: { label:"🔥 Rodada 3 — 7 de Março (Grupos A e B)", groups:{
        A: [["hawks","tog"], ["skyelite","parkclub"]],
        B: [["imperial","darkskull"], ["fury","tropopcorn"]],
      }},
      r3_08: { label:"🔥 Rodada 3 — 8 de Março (Grupos C e D)", groups:{
        C: [["trapaceiros","stage7"], ["vst","angels"]],
        D: [["lemon","deportivo"], ["logsevenb","elementais"]],
      }},
      r3_09: { label:"🔥 Rodada 3 — 9 de Março (Grupos E e F)", groups:{
        E: [["alvinegros","gladiators"], ["legends","sapos"]],
        F: [["nightfall","nytrix"], ["supernova","dragon"]],
      }},
      r3_10: { label:"🔥 Rodada 3 — 10 de Março (Grupos G e H)", groups:{
        G: [["grandseven","forestcrows"], ["prodigio","attacs"]],
        H: [["cyclone","logseven"], ["sekikana","hush"]],
      }},
    };

    const ALL_GROUP_KEYS = ["A","B","C","D","E","F","G","H"];

    /* ===============================
      STORAGE (pra não puxar antigo)
    =============================== */
    const STORAGE_KEY = "recnators_cup_md3_v1";
    const VIEW_KEY = "recnators_cup_view_v1";

    function defaultState(){ return {}; }
    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : defaultState();
      }catch{ return defaultState(); }
    }
    function saveState(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
    function resetAll(){
      localStorage.removeItem(STORAGE_KEY);
      state = defaultState();
      render();
    }
    function loadView(){ return localStorage.getItem(VIEW_KEY) || "r1_27"; }
    function saveView(v){ localStorage.setItem(VIEW_KEY, v); }

    let state = loadState();
    let currentView = loadView();

    const content = document.getElementById("content");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    function esc(s){
      return String(s).replace(/[&<>"']/g, (m)=>({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function badgeText(teamId){
      const name = TEAMS[teamId]?.name || teamId;
      const parts = name.split(" ").filter(Boolean);
      let out = "";
      for(const p of parts){
        const c = p[0];
        if(c && /[A-Za-z0-9]/.test(c)) out += c.toUpperCase();
        if(out.length>=3) break;
      }
      return out || "RL";
    }

    function makeMatchId(dayKey, groupKey, a, b){
      return `${dayKey}__${groupKey}__${a}__vs__${b}`;
    }

    function getSeries(matchId){
      return state[matchId] || [{a:"",b:""},{a:"",b:""},{a:"",b:""}];
    }

    function setGame(matchId, gameIndex, aVal, bVal){
      const s = JSON.parse(JSON.stringify(getSeries(matchId)));
      s[gameIndex] = {a:aVal, b:bVal};
      state[matchId] = s;
      saveState(state);
    }

    function sanitizeScore(v){
      if(v === "" || v === null || v === undefined) return "";
      const n = parseInt(v,10);
      if(!Number.isFinite(n)) return "";
      if(n < 0) return "0";
      if(n > 20) return "20";
      return String(n);
    }

    function gameWinner(a,b){
      if(!Number.isFinite(a) || !Number.isFinite(b)) return null;
      if(a>b) return "A";
      if(b>a) return "B";
      return null;
    }

    function seriesInfo(series3){
      let wA=0, wB=0, gfA=0, gfB=0;

      for(const g of series3){
        const a = (g.a==="" ? null : parseInt(g.a,10));
        const b = (g.b==="" ? null : parseInt(g.b,10));
        if(Number.isFinite(a)) gfA += a;
        if(Number.isFinite(b)) gfB += b;
        const win = gameWinner(a,b);
        if(win==="A") wA++;
        if(win==="B") wB++;
      }

      const j1 = series3[0], j2 = series3[1];
      const a1 = (j1.a===""?null:parseInt(j1.a,10)), b1=(j1.b===""?null:parseInt(j1.b,10));
      const a2 = (j2.a===""?null:parseInt(j2.a,10)), b2=(j2.b===""?null:parseInt(j2.b,10));
      let wA2=0, wB2=0;
      if(gameWinner(a1,b1)==="A") wA2++; else if(gameWinner(a1,b1)==="B") wB2++;
      if(gameWinner(a2,b2)==="A") wA2++; else if(gameWinner(a2,b2)==="B") wB2++;
      const lockJ3 = (wA2>=2 || wB2>=2);

      const decided = (wA>=2 || wB>=2);
      const winner = wA>=2 ? "A" : (wB>=2 ? "B" : null);

      return {wA,wB,decided,winner,lockJ3,gfA,gfB};
    }

    /* ===============================
      TABELA POR GRUPO (PTS, SG, GF)
      Vitória da série = 3 pts
      Desempate: PTS, SG, GF
    =============================== */
    function allMatchesOfGroup(groupKey){
      const list = [];
      for(const dayKey of Object.keys(SCHEDULE)){
        const groupsToday = SCHEDULE[dayKey].groups || {};
        if(!groupsToday[groupKey]) continue;
        for(const [aId,bId] of groupsToday[groupKey]){
          list.push({dayKey, groupKey, aId, bId, matchId: makeMatchId(dayKey, groupKey, aId, bId)});
        }
      }
      return list;
    }

    function computeGroupTable(groupKey){
      const teams = GROUPS[groupKey];
      const st = {};
      for(const t of teams) st[t] = {pts:0,v:0,d:0,gf:0,ga:0,sg:0};

      const matches = allMatchesOfGroup(groupKey);
      for(const m of matches){
        const series = getSeries(m.matchId);
        const info = seriesInfo(series);

        st[m.aId].gf += info.gfA; st[m.aId].ga += info.gfB;
        st[m.bId].gf += info.gfB; st[m.bId].ga += info.gfA;

        if(info.decided){
          if(info.winner==="A"){
            st[m.aId].pts += 3; st[m.aId].v += 1;
            st[m.bId].d += 1;
          }else if(info.winner==="B"){
            st[m.bId].pts += 3; st[m.bId].v += 1;
            st[m.aId].d += 1;
          }
        }
      }

      for(const t of teams) st[t].sg = st[t].gf - st[t].ga;

      const rows = teams.map(t=>({teamId:t, ...st[t]}));
      rows.sort((A,B)=>{
        if(B.pts !== A.pts) return B.pts - A.pts;
        if(B.sg  !== A.sg ) return B.sg  - A.sg;
        if(B.gf  !== A.gf ) return B.gf  - A.gf;
        return (TEAMS[A.teamId].name).localeCompare(TEAMS[B.teamId].name, "pt-BR");
      });
      return rows;
    }

    function renderGroupTable(groupKey, tbodyId){
      const rows = computeGroupTable(groupKey);
      const tb = document.getElementById(tbodyId);
      tb.innerHTML = "";

      rows.forEach((r, idx)=>{
        const rank = idx+1;
        const tr = document.createElement("tr");
        if(rank<=2) tr.classList.add("rowGood");
        if(rank>=3) tr.classList.add("rowBad");

        tr.innerHTML = `
          <td style="width:38px"><div class="rankBar"></div></td>
          <td style="width:44px">${rank}</td>
          <td>
            <div class="tdTeam">
              <div class="miniBadge">${esc(badgeText(r.teamId))}</div>
              <span style="font-weight:1000">${esc(TEAMS[r.teamId].name)}</span>
            </div>
          </td>
          <td>${r.pts}</td>
          <td>${r.v}</td>
          <td>${r.d}</td>
          <td>${r.gf}</td>
          <td>${r.ga}</td>
          <td>${r.sg}</td>
        `;
        tb.appendChild(tr);
      });
    }

    /* ===============================
      AUTO-AVANÇO (ir pro próximo input)
    =============================== */
    function focusNextInput(currentEl){
      const all = Array.from(document.querySelectorAll("input.scoreInput:not([disabled])"));
      const idx = all.indexOf(currentEl);
      if(idx >= 0 && idx < all.length - 1){
        all[idx + 1].focus();
        all[idx + 1].select?.();
      }
    }

    /* ===============================
      UI — MATCH CARD
    =============================== */
    function buildMatchCard(dayKey, groupKey, aId, bId, idx){
      const matchId = makeMatchId(dayKey, groupKey, aId, bId);
      const series = getSeries(matchId);
      const info = seriesInfo(series);

      const wrap = document.createElement("div");
      wrap.className = "match";
      wrap.innerHTML = `
        <div class="matchTop">
          <div>Confronto ${idx+1}</div>
          <div class="seriesPill" id="pill_${cssEscape(matchId)}">Série: ${info.wA}–${info.wB}</div>
        </div>

        <div class="rowTeams">
          <div class="side">
            <div class="teamBadge">${esc(badgeText(aId))}</div>
            <div class="name" title="${esc(TEAMS[aId].name)}">${esc(TEAMS[aId].name)}</div>
          </div>
          <div class="vs">x</div>
          <div class="side right">
            <div class="name" title="${esc(TEAMS[bId].name)}">${esc(TEAMS[bId].name)}</div>
            <div class="teamBadge">${esc(badgeText(bId))}</div>
          </div>
        </div>

        <div class="games">
          ${[0,1,2].map(i=>`
            <div class="gameRow">
              <div class="glabel">J${i+1}</div>
              <input class="scoreInput" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="20"
                     id="in_${cssEscape(matchId)}_${i}_a" placeholder="—" value="${series[i]?.a ?? ""}">
              <div style="text-align:center; font-weight:1000; opacity:.85">x</div>
              <input class="scoreInput" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="20"
                     id="in_${cssEscape(matchId)}_${i}_b" placeholder="—" value="${series[i]?.b ?? ""}">
            </div>
          `).join("")}
        </div>

        <div class="note" id="note_${cssEscape(matchId)}">
          ${info.lockJ3 ? "✅ <b>J3 bloqueado</b> (já deu 2–0 nos dois primeiros jogos)." : "Digite os gols do J1/J2/J3. A tabela atualiza sozinha."}
        </div>
      `;

      const getEl = (sel)=>wrap.querySelector(sel);

      function applyLock(inf){
        const a3 = getEl(`#in_${cssEscape(matchId)}_2_a`);
        const b3 = getEl(`#in_${cssEscape(matchId)}_2_b`);
        if(inf.lockJ3){
          a3.value = ""; b3.value = "";
          a3.disabled = true; b3.disabled = true;
          setGame(matchId, 2, "", "");
        }else{
          a3.disabled = false; b3.disabled = false;
        }
      }

      function updatePillAndNote(inf){
        const pill = getEl(`#pill_${cssEscape(matchId)}`);
        pill.textContent = `Série: ${inf.wA}–${inf.wB}`;
        const note = getEl(`#note_${cssEscape(matchId)}`);
        note.innerHTML = inf.lockJ3
          ? "✅ <b>J3 bloqueado</b> (já deu 2–0 nos dois primeiros jogos)."
          : "Digite os gols do J1/J2/J3. A tabela atualiza sozinha.";
      }

      [0,1,2].forEach(i=>{
        const aIn = getEl(`#in_${cssEscape(matchId)}_${i}_a`);
        const bIn = getEl(`#in_${cssEscape(matchId)}_${i}_b`);

        const onInput = (ev)=>{
          aIn.value = sanitizeScore(aIn.value);
          bIn.value = sanitizeScore(bIn.value);

          setGame(matchId, i, aIn.value, bIn.value);

          const inf2 = seriesInfo(getSeries(matchId));
          applyLock(inf2);
          updatePillAndNote(inf2);

          // re-render geral (mantém tudo consistente)
          render(false);

          // auto-avança quando digitou algo (1+ dígitos)
          if(ev && ev.target && ev.target.value !== ""){
            focusNextInput(ev.target);
          }
        };

        aIn.addEventListener("input", onInput);
        bIn.addEventListener("input", onInput);
      });

      applyLock(info);
      return wrap;
    }

    function cssEscape(s){
      return String(s).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
    }

    /* ===============================
      VIEWS
    =============================== */
    function buildDayView(dayKey){
      const day = SCHEDULE[dayKey];
      content.innerHTML = "";

      let decided=0, open=0, goals=0;

      for(const gKey of Object.keys(day.groups)){
        for(const [aId,bId] of day.groups[gKey]){
          const id = makeMatchId(dayKey,gKey,aId,bId);
          const info = seriesInfo(getSeries(id));
          if(info.decided) decided++; else open++;
          goals += info.gfA + info.gfB;
        }
      }

      const kpiCard = document.createElement("section");
      kpiCard.className = "card";
      kpiCard.innerHTML = `
        <div class="cardHead">
          <h2>📅 ${esc(day.label)}</h2>
          <span class="hint">MD3 • tabelas atualizam automaticamente</span>
        </div>
        <div class="section">
          <div class="kpis">
            <div class="kpi"><div class="n">${decided}</div><div class="l">Séries decididas (na data)</div></div>
            <div class="kpi"><div class="n">${open}</div><div class="l">Séries em aberto (na data)</div></div>
            <div class="kpi"><div class="n">${goals}</div><div class="l">Gols digitados (na data)</div></div>
          </div>
          <div class="note" style="margin-top:10px">
            Dica: se os 2 primeiros jogos fecharem <b>2–0</b>, o <b>J3 bloqueia</b> sozinho.
          </div>
        </div>
      `;
      content.appendChild(kpiCard);

      const groupsToday = Object.keys(day.groups);

      for(const gKey of groupsToday){
        const block = document.createElement("section");
        block.className = "card";
        block.innerHTML = `
          <div class="cardHead">
            <h2>🏆 Grupo ${gKey}</h2>
            <span class="hint">Vitória da série = 3 pts • Desempate: PTS, SG, GF</span>
          </div>
          <div class="section">
            <div class="groupBlock">
              <div class="groupHead">
                <div class="groupTitle">Jogos do Grupo ${gKey} (${esc(dayKey.replaceAll("_","/").toUpperCase())})</div>
                <div class="groupMeta">MD3</div>
              </div>
              <div class="matches" id="matches_${dayKey}_${gKey}"></div>
            </div>

            <div class="note" style="margin:10px 2px 8px">Classificação do Grupo ${gKey} (geral)</div>
            <div style="overflow:auto">
              <table>
                <thead>
                  <tr>
                    <th style="width:38px"></th>
                    <th style="width:44px">#</th>
                    <th>Time</th>
                    <th>PTS</th><th>V</th><th>D</th>
                    <th>GF</th><th>GA</th><th>SG</th>
                  </tr>
                </thead>
                <tbody id="tb_day_${dayKey}_${gKey}"></tbody>
              </table>
            </div>
          </div>
        `;
        content.appendChild(block);

        const holder = document.getElementById(`matches_${dayKey}_${gKey}`);
        day.groups[gKey].forEach((pair, idx)=>{
          holder.appendChild(buildMatchCard(dayKey, gKey, pair[0], pair[1], idx));
        });

        renderGroupTable(gKey, `tb_day_${dayKey}_${gKey}`);
      }
    }

    function buildTableView(){
      content.innerHTML = `
        <section class="card">
          <div class="cardHead">
            <h2>📊 Tabela — Separada por Grupos</h2>
            <span class="hint">Top 2 verde • 3º/4º vermelho • Desempate: PTS, SG, GF</span>
          </div>
          <div class="section">
            <div class="note">
              ✅ Esta aba junta TODOS os resultados das datas e calcula a classificação de cada grupo.
            </div>
          </div>
        </section>
      `;

      for(const gKey of ALL_GROUP_KEYS){
        const sec = document.createElement("section");
        sec.className = "card";
        sec.innerHTML = `
          <div class="cardHead">
            <h2>🏆 Grupo ${gKey}</h2>
            <span class="hint">${esc(TEAMS[GROUPS[gKey][0]].name)} • ${esc(TEAMS[GROUPS[gKey][1]].name)} • ${esc(TEAMS[GROUPS[gKey][2]].name)} • ${esc(TEAMS[GROUPS[gKey][3]].name)}</span>
          </div>
          <div class="section">
            <div style="overflow:auto">
              <table>
                <thead>
                  <tr>
                    <th style="width:38px"></th>
                    <th style="width:44px">#</th>
                    <th>Time</th>
                    <th>PTS</th><th>V</th><th>D</th>
                    <th>GF</th><th>GA</th><th>SG</th>
                  </tr>
                </thead>
                <tbody id="tb_table_${gKey}"></tbody>
              </table>
            </div>
          </div>
        `;
        content.appendChild(sec);
        renderGroupTable(gKey, `tb_table_${gKey}`);
      }
    }

    function buildPlayoffsView(){
      content.innerHTML = `
        <section class="card">
          <div class="cardHead">
            <h2>🏆 PLAYOFFS</h2>
            <span class="hint">Classificam: 2 melhores de cada grupo</span>
          </div>
          <div class="section">
            <div class="note" style="font-size:13px; color: rgba(232,238,252,.92); font-weight:850">
              <b>Formato:</b><br><br>
              • Oitavas de Final — <b>MD3</b><br>
              • Quartas de Final — <b>MD3</b><br>
              • Semifinal — <b>MD5</b><br>
              • Final — <b>MD5</b><br><br>
              (Aqui a gente pode montar depois o chaveamento automático quando os grupos fecharem.)
            </div>
          </div>
        </section>
      `;
    }

    /* ===============================
      COPY
    =============================== */
    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
        alert("Copiado!");
      }catch{
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        alert("Copiado!");
      }
    }

    function buildCopyForView(viewKey){
      if(viewKey === "table"){
        let out = "📊 TABELA — RECNATORS CUP\n";
        for(const gKey of ALL_GROUP_KEYS){
          const rows = computeGroupTable(gKey);
          out += `\n🏆 Grupo ${gKey}\n`;
          rows.forEach((r,i)=>{
            out += `${i+1}. ${TEAMS[r.teamId].name} — ${r.pts} pts (SG ${r.sg}, GF ${r.gf})\n`;
          });
        }
        return out.trim();
      }

      if(viewKey === "playoffs"){
        return (
`🏆 PLAYOFFS — RECNATORS CUP
Classificam: 2 melhores de cada grupo

Oitavas — MD3
Quartas — MD3
Semifinal — MD5
Final — MD5`
        );
      }

      const day = SCHEDULE[viewKey];
      let out = `📅 ${day.label}\n`;
      for(const gKey of Object.keys(day.groups)){
        out += `\n🏆 Grupo ${gKey}\n`;
        day.groups[gKey].forEach(([a,b])=>{
          out += `• ${TEAMS[a].name} x ${TEAMS[b].name}\n`;
        });
      }
      return out.trim();
    }

    /* ===============================
      TABS + RENDER
      render(full=true) reconstroi a view inteira
      render(full=false) só atualiza tabelas quando possível
    =============================== */
    function setActiveTab(view){
      currentView = view;
      saveView(view);
      tabs.forEach(t=>{
        const active = t.dataset.view === view;
        t.setAttribute("aria-selected", active ? "true" : "false");
      });
    }

    function render(full=true){
      if(full){
        if(currentView === "table") buildTableView();
        else if(currentView === "playoffs") buildPlayoffsView();
        else buildDayView(currentView);
        return;
      }

      // atualização leve: se for tabela, atualiza tbodys
      if(currentView === "table"){
        for(const gKey of ALL_GROUP_KEYS){
          renderGroupTable(gKey, `tb_table_${gKey}`);
        }
        return;
      }

      // se for dia: tenta atualizar as tabelas daquele dia
      if(SCHEDULE[currentView]){
        const day = SCHEDULE[currentView];
        for(const gKey of Object.keys(day.groups)){
          const id = `tb_day_${currentView}_${gKey}`;
          const el = document.getElementById(id);
          if(el) renderGroupTable(gKey, id);
        }
      }
    }

    tabs.forEach(t=>{
      t.addEventListener("click", ()=>{
        setActiveTab(t.dataset.view);
        render(true);
      });
    });

    document.getElementById("btnResetAll").addEventListener("click", ()=>{
      if(confirm("Resetar todos os resultados da Recnators Cup?")) resetAll();
    });

    document.getElementById("btnCopyView").addEventListener("click", ()=>{
      copyText(buildCopyForView(currentView));
    });

    // boot
    setActiveTab(currentView);
    render(true);
  </script>
</body>
</html>
